<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{% block title %}Content Hub{% endblock %}</title>
<link rel="stylesheet" href="/static/style.css" />
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="brand-mark"></span>
    <a href="/" class="brand-name">Content Hub</a>
  </div>
  <nav class="topnav">
    <a href="/">This week</a>
    <a href="/calendar">Marketing</a>
    <a href="/market-news">Market News</a>
    <a href="/post-times">Best times</a>
    <a href="/archive">Archive</a>
  </nav>
</header>
<main class="page">
  {% block content %}{% endblock %}
</main>
</body>
</html>
