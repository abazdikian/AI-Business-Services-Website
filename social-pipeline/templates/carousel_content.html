<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; }
  .slide {
    width: 1080px; height: 1350px;
    background: #F7F3EE; position: relative;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 100px 90px 120px;
  }
  .big-num {
    font-family: 'Playfair Display', serif;
    font-size: 140px; font-weight: 900;
    color: rgba(201,168,71,0.15); line-height: 1;
    margin-bottom: 16px;
  }
  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 48px; font-weight: 700;
    color: #1C1C1C; line-height: 1.25;
    letter-spacing: -0.02em; margin-bottom: 20px;
  }
  .gold-bar {
    width: 80px; height: 3px;
    background: #C9A847;
    border-radius: 2px; margin-bottom: 32px;
  }
  .body-text {
    font-family: 'Inter', sans-serif; font-size: 28px;
    color: #4a4540; line-height: 1.75;
    max-width: 850px;
  }
  .footer {
    position: absolute; bottom: 44px; left: 80px; right: 80px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-name {
    font-family: 'Playfair Display', serif; font-size: 18px;
    font-weight: 700; color: #7D2240;
  }
  .footer-site {
    font-family: 'Inter', sans-serif; font-size: 14px;
    color: rgba(107,101,96,0.5); letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="big-num">{{NUMBER}}</div>
  <h2 class="headline">{{TITLE}}</h2>
  <div class="gold-bar"></div>
  <p class="body-text">{{BODY}}</p>
  <div class="footer">
    <span class="footer-name">Alice Bazdikian</span>
    <span class="footer-site">smallbusinessaicoach.com</span>
  </div>
</div>
</body>
</html>
